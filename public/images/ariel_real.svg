<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="ari-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </radialGradient>
    <linearGradient id="ari-bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#ari-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="14" fill="url(#ari-bag)"/>
    <path d="M 0 0 L 140 0 L 140 45 Q 70 60 0 45 Z" fill="#ffffff"/>

    <text x="70" y="30" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#15803d" text-anchor="middle">ARIEL</text>
    <text x="70" y="75" font-family="'Arial Black', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">MATIC</text>

    <!-- Ariel Atom Rings Graphic -->
    <ellipse cx="70" cy="115" rx="28" ry="10" fill="none" stroke="#facc15" stroke-width="3.5" transform="rotate(-30 70 115)"/>
    <ellipse cx="70" cy="115" rx="28" ry="10" fill="none" stroke="#38bdf8" stroke-width="3.5" transform="rotate(30 70 115)"/>
    <ellipse cx="70" cy="115" rx="28" ry="10" fill="none" stroke="#ef4444" stroke-width="3.5" transform="rotate(90 70 115)"/>
    <circle cx="70" cy="115" r="7" fill="#ffffff"/>

    <text x="70" y="160" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle">FRONT LOAD</text>
    <text x="70" y="180" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#86efac" text-anchor="middle">1 kg PACK</text>
  </g>
</svg>
