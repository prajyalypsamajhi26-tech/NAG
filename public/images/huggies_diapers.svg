<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="hug-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="hug-pkg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="hug-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#dc2626" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#hug-bg)"/>

  <g filter="url(#hug-shadow)" transform="translate(130, 40)">
    <rect x="0" y="0" width="140" height="190" rx="14" fill="url(#hug-pkg)"/>

    <rect x="0" y="0" width="140" height="45" rx="14" fill="#ffffff"/>
    <text x="70" y="28" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="#dc2626" text-anchor="middle">HUGGIES</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#2563eb" text-anchor="middle">WONDER PANTS</text>

    <!-- Diaper Pants Graphic -->
    <path d="M 35 70 C 35 120, 105 120, 105 70 L 95 70 C 95 105, 45 105, 45 70 Z" fill="#ffffff"/>
    <circle cx="70" cy="85" r="8" fill="#ef4444"/>

    <circle cx="110" cy="150" r="22" fill="#facc15"/>
    <text x="110" y="147" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="#78350f" text-anchor="middle">SIZE</text>
    <text x="110" y="162" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="#78350f" text-anchor="middle">S</text>

    <text x="70" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">PANTS</text>
    <text x="70" y="170" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#fecaca" text-anchor="middle">22 PCS</text>
  </g>
</svg>
