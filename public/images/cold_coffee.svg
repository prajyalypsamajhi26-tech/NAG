<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="coffee-liq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <filter id="cc-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#451a03" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#cc-bg)"/>

  <g filter="url(#cc-shadow)" transform="translate(140, 35)">
    <!-- Straw -->
    <path d="M 85 0 L 70 30 L 45 60" fill="none" stroke="#78350f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Clear Glass Container -->
    <path d="M 20 40 L 100 40 L 85 210 C 85 220, 35 220, 35 210 Z" fill="#ffffff" opacity="0.4" stroke="#d97706" stroke-width="2"/>

    <!-- Coffee Liquid -->
    <path d="M 22 65 L 98 65 L 84 206 C 84 214, 36 214, 36 206 Z" fill="url(#coffee-liq)"/>

    <!-- Ice Cubes inside -->
    <rect x="40" y="90" width="22" height="22" rx="4" fill="#ffffff" opacity="0.6" transform="rotate(15, 40, 90)"/>
    <rect x="55" y="130" width="25" height="25" rx="4" fill="#ffffff" opacity="0.6" transform="rotate(-20, 55, 130)"/>

    <!-- Whipped Cream Dome Top -->
    <ellipse cx="60" cy="40" rx="40" ry="15" fill="#fef3c7"/>
    <circle cx="60" cy="32" r="25" fill="#ffffff"/>
    <circle cx="48" cy="38" r="18" fill="#ffffff"/>
    <circle cx="72" cy="38" r="18" fill="#ffffff"/>

    <!-- Chocolate Drizzle lines -->
    <path d="M 40 30 Q 60 45 80 30" fill="none" stroke="#451a03" stroke-width="3"/>
    <path d="M 45 22 Q 60 35 75 22" fill="none" stroke="#451a03" stroke-width="2"/>

    <text x="60" y="240" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#78350f" text-anchor="middle">COLD COFFEE 250ml</text>
  </g>
</svg>
