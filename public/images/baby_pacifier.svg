<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="pac-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <filter id="pac-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#pac-bg)"/>

  <g filter="url(#pac-shadow)" transform="translate(130, 50)">
    <!-- Silicone Nipple Teat -->
    <ellipse cx="70" cy="40" rx="25" ry="35" fill="#fef08a" opacity="0.9"/>

    <!-- Plastic Shield -->
    <path d="M 15 70 C 15 50, 125 50, 125 70 C 125 100, 15 100, 15 70 Z" fill="#06b6d4"/>
    <circle cx="35" cy="70" r="8" fill="#ffffff"/>
    <circle cx="105" cy="70" r="8" fill="#ffffff"/>

    <!-- Ring Handle -->
    <circle cx="70" cy="115" r="22" fill="none" stroke="#0891b2" stroke-width="8"/>

    <text x="70" y="165" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#0e7490" text-anchor="middle">BABY PACIFIER</text>
  </g>
</svg>
