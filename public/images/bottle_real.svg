<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bot-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#bot-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(150, 25)">
    <!-- Silicone Nipple Teat -->
    <path d="M 40 10 C 40 25, 60 25, 60 10 Q 50 0 40 10 Z" fill="#fde047" opacity="0.95"/>
    <rect x="25" y="25" width="50" height="15" rx="3" fill="#0284c7"/>

    <!-- Clear Glass Bottle Body -->
    <rect x="20" y="40" width="60" height="170" rx="16" fill="#ffffff" stroke="#38bdf8" stroke-width="2.5"/>
    <rect x="23" y="80" width="54" height="125" rx="10" fill="#fef08a" opacity="0.45"/>

    <!-- Measurement Markings -->
    <line x1="25" y1="90" x2="35" y2="90" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="110" x2="35" y2="110" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="130" x2="42" y2="130" stroke="#0284c7" stroke-width="3"/>
    <line x1="25" y1="150" x2="35" y2="150" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="170" x2="42" y2="170" stroke="#0284c7" stroke-width="3"/>

    <text x="50" y="198" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#0369a1" text-anchor="middle">260 ml</text>
  </g>
</svg>
