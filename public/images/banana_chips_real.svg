<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="ban-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </radialGradient>
    <linearGradient id="ban-bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#ban-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="14" fill="url(#ban-bag)"/>
    
    <!-- Banana Slice Graphics -->
    <circle cx="70" cy="70" r="24" fill="#fef08a" stroke="#ca8a04" stroke-width="3"/>
    <circle cx="70" cy="70" r="6" fill="#854d0e"/>

    <text x="70" y="125" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">KERALA</text>
    <text x="70" y="145" font-family="'Arial Black', sans-serif" font-weight="900" font-size="14" fill="#fef08a" text-anchor="middle">BANANA CHIPS</text>
    <text x="70" y="170" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#ffffff" text-anchor="middle">COCONUT OIL</text>
  </g>
</svg>
