<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="gar-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#gar-bg)"/>
  <ellipse cx="200" cy="240" rx="90" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 65)">
    <rect x="0" y="0" width="200" height="130" rx="16" fill="#1e293b"/>
    <rect x="15" y="15" width="170" height="100" rx="10" fill="#0f172a"/>

    <!-- Tie Tape Ribbon -->
    <rect x="0" y="55" width="200" height="20" fill="#22c55e"/>

    <text x="100" y="42" font-family="'Arial Black', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">GARBAGE BAGS</text>
    <text x="100" y="95" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#86efac" text-anchor="middle">MEDIUM • 30 BAGS</text>
    <text x="100" y="112" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#cbd5e1" text-anchor="middle">OXO-BIODEGRADABLE</text>
  </g>
</svg>
