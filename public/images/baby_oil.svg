<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="oil-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="oil-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <filter id="oil-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#9a3412" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#oil-bg)"/>

  <g filter="url(#oil-shadow)" transform="translate(155, 35)">
    <rect x="30" y="10" width="40" height="20" fill="#f97316" rx="4"/>
    <rect x="15" y="30" width="70" height="170" rx="15" fill="url(#oil-bot)"/>

    <rect x="20" y="55" width="60" height="110" rx="6" fill="#ffffff"/>
    <text x="50" y="80" font-family="'Arial Black', sans-serif" font-weight="900" font-size="11" fill="#c2410c" text-anchor="middle">DABUR</text>
    <text x="50" y="98" font-family="'Impact', sans-serif" font-weight="900" font-size="14" fill="#dc2626" text-anchor="middle">LAL TAIL</text>
    <text x="50" y="118" font-family="Arial, sans-serif" font-weight="bold" font-size="8" fill="#475569" text-anchor="middle">BABY MASSAGE</text>
    <text x="50" y="130" font-family="Arial, sans-serif" font-weight="bold" font-size="8" fill="#475569" text-anchor="middle">OIL</text>
    <text x="50" y="152" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#c2410c" text-anchor="middle">100 ml</text>
  </g>
</svg>
