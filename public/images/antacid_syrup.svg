<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="ant-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="ant-bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="ant-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#db2777" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#ant-bg)"/>

  <!-- Measuring Spoon with Pink Liquid (Left) -->
  <g opacity="0.9" transform="translate(65, 120)">
    <path d="M 0 10 Q 40 10 50 20 L 80 20 C 95 20 95 45 80 45 L 50 45 Q 40 55 0 55 Z" fill="#e2e8f0"/>
    <ellipse cx="75" cy="32" rx="15" ry="8" fill="#f472b6"/>
  </g>

  <!-- Antacid Syrup Bottle (Right) -->
  <g filter="url(#ant-shadow)" transform="translate(160, 40)">
    <!-- White Screw Cap -->
    <rect x="25" y="15" width="40" height="25" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="20" y="40" width="50" height="10" rx="2" fill="#db2777"/>

    <!-- Bottle Body -->
    <rect x="10" y="50" width="70" height="150" rx="16" fill="url(#ant-bottle)"/>

    <!-- White Label -->
    <rect x="15" y="70" width="60" height="100" rx="6" fill="#ffffff"/>

    <text x="45" y="94" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="#db2777" text-anchor="middle">ANTACID</text>
    <text x="45" y="108" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#ec4899" text-anchor="middle">SYRUP</text>

    <!-- Stomach Relief Icon -->
    <circle cx="45" cy="132" r="14" fill="#fbcfe8"/>
    <path d="M 45 124 C 38 124 38 140 45 140 C 52 140 52 124 45 124 Z" fill="#db2777"/>

    <text x="45" y="158" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#9d174d" text-anchor="middle">200 ml</text>
  </g>
</svg>
