<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0369a1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>

  <!-- Bottle shadow & body -->
  <g filter="url(#shadow)" transform="translate(150, 60)">
    <!-- Blue Cap -->
    <rect x="32" y="20" width="36" height="35" rx="6" fill="url(#cap)"/>
    <rect x="28" y="52" width="44" height="8" rx="2" fill="#0284c7"/>

    <!-- Dropper Tip -->
    <path d="M 42 55 L 58 55 L 54 80 L 46 80 Z" fill="#e2e8f0"/>

    <!-- Bottle Body -->
    <path d="M 25 80 C 25 75, 75 75, 75 80 L 82 170 C 82 185, 18 185, 18 170 Z" fill="url(#bottle)"/>

    <!-- Bottle Label -->
    <rect x="23" y="100" width="54" height="60" rx="4" fill="#0284c7"/>
    <circle cx="50" cy="120" r="12" fill="#ffffff"/>
    <!-- Eye Icon on label -->
    <path d="M 42 120 Q 50 112 58 120 Q 50 128 42 120 Z" fill="#0284c7"/>
    <circle cx="50" cy="120" r="4" fill="#0284c7"/>
    <text x="50" y="146" font-family="Arial, sans-serif" font-weight="bold" font-size="8" fill="#ffffff" text-anchor="middle">EYE DROPS</text>

    <!-- Droplet falling -->
    <path d="M 50 195 C 43 208 43 218 50 222 C 57 218 57 208 50 195 Z" fill="url(#drop)"/>
    <!-- Ripples -->
    <ellipse cx="50" cy="226" rx="25" ry="5" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.4"/>
    <ellipse cx="50" cy="226" rx="14" ry="3" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
