<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="pamp-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <linearGradient id="pamp-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="gold-badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Studio Background -->
  <rect width="400" height="300" rx="16" fill="url(#pamp-bg)"/>

  <!-- Product Shadow & Stand -->
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <!-- Pampers Pack 3D Container -->
  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="16" fill="url(#pamp-pack)"/>
    
    <!-- Top White Curve Header -->
    <path d="M 0 0 L 140 0 L 140 50 Q 70 65 0 50 Z" fill="#ffffff"/>
    <text x="70" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#0d9488" text-anchor="middle" letter-spacing="0.5">Pampers</text>
    <text x="70" y="44" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#ca8a04" text-anchor="middle">ALL-ROUND PROTECTION</text>

    <!-- Center Diaper Graphic -->
    <path d="M 32 75 C 32 135, 108 135, 108 75 L 96 75 C 96 115, 44 115, 44 75 Z" fill="#ffffff"/>
    <circle cx="70" cy="92" r="10" fill="#fef08a"/>
    <path d="M 63 92 L 77 92 M 70 85 L 70 99" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Gold Size Badge -->
    <circle cx="110" cy="155" r="22" fill="url(#gold-badge)" stroke="#ffffff" stroke-width="2"/>
    <text x="110" y="152" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#713f12" text-anchor="middle">SIZE</text>
    <text x="110" y="167" font-family="Arial, sans-serif" font-weight="900" font-size="17" fill="#713f12" text-anchor="middle">M</text>

    <text x="70" y="155" font-family="Arial, sans-serif" font-weight="900" font-size="15" fill="#ffffff" text-anchor="middle">BABY PANTS</text>
    <text x="70" y="175" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#99f6e4" text-anchor="middle">20 DIAPERS</text>
  </g>
</svg>
