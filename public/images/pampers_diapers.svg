<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="pam-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="pam-pkg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="pam-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#0f766e" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#pam-bg)"/>

  <g filter="url(#pam-shadow)" transform="translate(130, 40)">
    <!-- Diaper Pack -->
    <rect x="0" y="0" width="140" height="190" rx="14" fill="url(#pam-pkg)"/>
    
    <!-- White Header -->
    <rect x="0" y="0" width="140" height="45" rx="14" fill="#ffffff"/>
    <text x="70" y="28" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="#0d9488" text-anchor="middle">Pampers</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#f59e0b" text-anchor="middle">ALL ROUND PROTECTION</text>

    <!-- Diaper Graphic -->
    <path d="M 35 70 C 35 120, 105 120, 105 70 L 95 70 C 95 105, 45 105, 45 70 Z" fill="#ffffff"/>
    <circle cx="70" cy="85" r="8" fill="#fef08a"/>
    <path d="M 64 85 L 76 85 M 70 79 L 70 91" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

    <!-- Yellow Badge -->
    <circle cx="110" cy="150" r="22" fill="#fbbf24"/>
    <text x="110" y="147" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="#78350f" text-anchor="middle">SIZE</text>
    <text x="110" y="162" font-family="Arial, sans-serif" font-weight="900" font-size="16" fill="#78350f" text-anchor="middle">M</text>

    <text x="70" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">PANTS</text>
    <text x="70" y="170" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#ccfbf1" text-anchor="middle">20 PCS</text>
  </g>
</svg>
