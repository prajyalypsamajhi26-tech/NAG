<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="pwd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="pwd-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#ea580c" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#pwd-bg)"/>

  <g filter="url(#pwd-shadow)" transform="translate(150, 35)">
    <!-- White Twist Cap -->
    <rect x="25" y="10" width="50" height="25" rx="5" fill="#f43f5e"/>

    <!-- Bottle Body -->
    <rect x="15" y="35" width="70" height="170" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

    <!-- Pink Ribbon Label -->
    <rect x="20" y="70" width="60" height="100" rx="8" fill="#fff1f2"/>
    <text x="50" y="98" font-family="'Arial Black', sans-serif" font-weight="900" font-size="9" fill="#be123c" text-anchor="middle">JOHNSON'S</text>
    <text x="50" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#fb7185" text-anchor="middle">BABY</text>
    <text x="50" y="132" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#e11d48" text-anchor="middle">POWDER</text>
    <text x="50" y="155" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#9f1239" text-anchor="middle">200g</text>
  </g>
</svg>
