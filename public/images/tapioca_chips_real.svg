<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="tap-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </radialGradient>
    <linearGradient id="tap-bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#tap-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="14" fill="url(#tap-bag)"/>
    
    <!-- Tapioca Wafers Graphic -->
    <ellipse cx="70" cy="70" rx="28" ry="18" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>

    <text x="70" y="125" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">SWEET KARAM</text>
    <text x="70" y="145" font-family="'Arial Black', sans-serif" font-weight="900" font-size="13" fill="#ffedd5" text-anchor="middle">TAPIOCA CHIPS</text>
    <text x="70" y="170" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#ffffff" text-anchor="middle">SALTED • 65g</text>
  </g>
</svg>
