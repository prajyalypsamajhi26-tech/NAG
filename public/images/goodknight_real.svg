<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="gk-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#gk-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(145, 30)">
    <!-- Wick Rod Cap -->
    <rect x="42" y="10" width="16" height="30" fill="#1e293b" rx="2"/>
    <rect x="30" y="35" width="40" height="15" fill="#ca8a04" rx="4"/>

    <!-- Clear Plastic Bottle -->
    <rect x="15" y="50" width="70" height="155" rx="18" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="20" y="90" width="60" height="105" rx="10" fill="#fde047" opacity="0.5"/>

    <!-- Label -->
    <rect x="22" y="65" width="56" height="110" rx="8" fill="#ffffff"/>
    <text x="50" y="88" font-family="'Impact', sans-serif" font-weight="900" font-size="12" fill="#dc2626" text-anchor="middle">GOOD</text>
    <text x="50" y="102" font-family="'Impact', sans-serif" font-weight="900" font-size="12" fill="#dc2626" text-anchor="middle">KNIGHT</text>

    <!-- Gold Flash Star -->
    <path d="M 50 115 L 53 123 L 61 123 L 55 128 L 57 136 L 50 131 L 43 136 L 45 128 L 39 123 L 47 123 Z" fill="#eab308"/>

    <text x="50" y="152" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1e293b" text-anchor="middle">GOLD FLASH</text>
    <text x="50" y="164" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#dc2626" text-anchor="middle">REFILL</text>
  </g>
</svg>
