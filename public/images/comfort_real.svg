<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="com-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
    <linearGradient id="com-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#com-bg)"/>
  <ellipse cx="200" cy="245" rx="65" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(145, 25)">
    <!-- Measuring Cap -->
    <rect x="35" y="10" width="40" height="25" rx="6" fill="#a5b4fc"/>

    <!-- Bottle Body with Handle -->
    <rect x="15" y="35" width="80" height="170" rx="20" fill="url(#com-bot)"/>

    <rect x="22" y="65" width="66" height="110" rx="10" fill="#ffffff"/>
    <text x="55" y="94" font-family="'Impact', sans-serif" font-weight="900" font-size="20" fill="#3730a3" text-anchor="middle">COMFORT</text>
    <text x="55" y="112" font-family="Arial, sans-serif" font-weight="900" font-size="9" fill="#ec4899" text-anchor="middle">FABRIC CONDITIONER</text>

    <!-- Flower Petal Graphic -->
    <circle cx="55" cy="135" r="10" fill="#f472b6"/>
    <circle cx="55" cy="135" r="5" fill="#fde047"/>

    <text x="55" y="162" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#4338ca" text-anchor="middle">860 ml</text>
  </g>
</svg>
