<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="nasal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="nasal-bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="nasal-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#0f766e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#nasal-bg)"/>

  <g filter="url(#nasal-shadow)" transform="translate(150, 45)">
    <!-- Spray Nozzle Tip -->
    <path d="M 44 20 L 56 20 L 54 60 L 46 60 Z" fill="#0d9488"/>
    <ellipse cx="50" cy="20" rx="6" ry="3" fill="#115e59"/>

    <!-- Finger Grip Wings -->
    <rect x="25" y="60" width="50" height="12" rx="4" fill="#14b8a6"/>

    <!-- Cap Collar -->
    <rect x="35" y="72" width="30" height="16" rx="2" fill="#0f766e"/>

    <!-- Bottle Body -->
    <rect x="20" y="88" width="60" height="110" rx="20" fill="url(#nasal-bottle)"/>

    <!-- Label -->
    <rect x="24" y="110" width="52" height="65" rx="6" fill="#0d9488"/>
    <text x="50" y="132" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">NASAL</text>
    <text x="50" y="145" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">DROPS</text>
    <text x="50" y="162" font-family="Arial, sans-serif" font-size="7" fill="#ccfbf1" text-anchor="middle">10ml</text>

    <!-- Spray Mist effect at tip -->
    <circle cx="50" cy="8" r="3" fill="#0d9488" opacity="0.6"/>
    <circle cx="42" cy="0" r="2" fill="#14b8a6" opacity="0.5"/>
    <circle cx="58" cy="2" r="2.5" fill="#14b8a6" opacity="0.5"/>
    <circle cx="48" cy="-8" r="2" fill="#2dd4bf" opacity="0.4"/>
    <circle cx="54" cy="-10" r="1.5" fill="#2dd4bf" opacity="0.4"/>
  </g>
</svg>
