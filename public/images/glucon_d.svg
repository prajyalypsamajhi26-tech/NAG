<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="gd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="gd-box" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="gd-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#c2410c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#gd-bg)"/>

  <!-- Glass of Tangy Orange Glucon-D (Left) -->
  <g opacity="0.95" transform="translate(60, 50)">
    <path d="M 20 30 L 90 30 L 78 190 C 78 200, 32 200, 32 190 Z" fill="#f97316" opacity="0.95"/>
    <ellipse cx="55" cy="30" rx="35" ry="8" fill="#fdba74"/>
    <path d="M 15 25 L 95 25 L 82 195 C 82 203, 28 203, 28 195 Z" fill="#ffffff" opacity="0.2" stroke="#ea580c" stroke-width="2"/>
    <!-- Straw -->
    <path d="M 75 5 L 60 40 L 40 80" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
    <!-- Orange Slice on Rim -->
    <circle cx="20" cy="30" r="16" fill="#fb923c"/>
    <circle cx="20" cy="30" r="11" fill="#ffedd5"/>
  </g>

  <!-- Glucon-D Product Box (Right) -->
  <g filter="url(#gd-shadow)" transform="translate(170, 45)">
    <!-- Box Outer Shape -->
    <rect x="0" y="0" width="150" height="200" rx="10" fill="url(#gd-box)"/>

    <!-- Green Top Header Strip -->
    <rect x="0" y="0" width="150" height="35" rx="10" fill="#16a34a"/>

    <!-- White Energy Sunburst -->
    <circle cx="75" cy="115" r="45" fill="#facc15"/>
    <circle cx="75" cy="115" r="36" fill="#ffffff"/>

    <text x="75" y="24" font-family="Arial, sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">INSTANT ENERGY</text>

    <!-- Main Brand Name -->
    <text x="75" y="105" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="28" fill="#ea580c" text-anchor="middle">GLUCON-D</text>
    <text x="75" y="130" font-family="'Arial Black', sans-serif" font-weight="bold" font-size="13" fill="#16a34a" text-anchor="middle">TANGY ORANGE</text>

    <!-- Energy Zap Icon -->
    <polygon points="75,140 78,155 70,155 77,175 66,160 73,160" fill="#ea580c"/>

    <text x="75" y="190" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">GLUCOSE DRINK 200g</text>
  </g>
</svg>
