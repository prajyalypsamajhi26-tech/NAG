<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="wip-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#wip-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 50)">
    <!-- Wiper Handle -->
    <rect x="90" y="0" width="20" height="110" rx="6" fill="#0284c7"/>
    <!-- Rubber Blade Bar -->
    <rect x="10" y="100" width="180" height="25" rx="4" fill="#1e293b"/>

    <text x="100" y="155" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#0369a1" text-anchor="middle">GALA SINK WIPER</text>
  </g>
</svg>
