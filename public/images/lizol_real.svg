<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="liz-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </radialGradient>
    <linearGradient id="liz-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#liz-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(155, 30)">
    <rect x="30" y="10" width="40" height="20" fill="#dc2626" rx="4"/>
    <rect x="15" y="30" width="70" height="175" rx="20" fill="url(#liz-bot)"/>

    <rect x="20" y="55" width="60" height="115" rx="8" fill="#ffffff"/>
    <text x="50" y="84" font-family="'Impact', sans-serif" font-weight="900" font-size="22" fill="#dc2626" text-anchor="middle">LIZOL</text>
    <text x="50" y="102" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#ea580c" text-anchor="middle">DISINFECTANT</text>
    <text x="50" y="116" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#475569" text-anchor="middle">FLOOR CLEANER</text>

    <!-- Shield Icon -->
    <path d="M 50 125 L 60 130 L 60 142 C 60 148 50 152 50 152 C 50 152 40 148 40 142 L 40 130 Z" fill="#22c55e"/>

    <text x="50" y="162" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#c2410c" text-anchor="middle">CITRUS • 500ml</text>
  </g>
