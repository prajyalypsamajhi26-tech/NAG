<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bot-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="bot-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#0284c7" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#bot-bg)"/>

  <g filter="url(#bot-shadow)" transform="translate(150, 25)">
    <!-- Silicone Nipple -->
    <path d="M 40 10 C 40 25, 60 25, 60 10 Q 50 0 40 10 Z" fill="#fde047" opacity="0.9"/>
    <!-- Screw Ring -->
    <rect x="25" y="25" width="50" height="15" rx="3" fill="#0284c7"/>

    <!-- Clear Glass Bottle Body -->
    <rect x="20" y="40" width="60" height="170" rx="15" fill="#ffffff" opacity="0.95" stroke="#38bdf8" stroke-width="2"/>
    <!-- Milk Fill -->
    <rect x="23" y="80" width="54" height="125" rx="10" fill="#fef08a" opacity="0.4"/>

    <!-- Measurement Markings -->
    <line x1="25" y1="90" x2="35" y2="90" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="110" x2="35" y2="110" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="130" x2="40" y2="130" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="25" y1="150" x2="35" y2="150" stroke="#0284c7" stroke-width="2"/>
    <line x1="25" y1="170" x2="40" y2="170" stroke="#0284c7" stroke-width="2.5"/>

    <text x="50" y="198" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#0369a1" text-anchor="middle">260 ml</text>
  </g>
</svg>
