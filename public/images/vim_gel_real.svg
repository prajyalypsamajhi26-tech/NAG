<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="vim-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </radialGradient>
    <linearGradient id="vim-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#vim-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(155, 30)">
    <rect x="30" y="10" width="40" height="20" fill="#facc15" rx="4"/>
    <rect x="15" y="30" width="70" height="175" rx="20" fill="url(#vim-bot)"/>

    <rect x="20" y="55" width="60" height="115" rx="8" fill="#ffffff"/>
    <text x="50" y="82" font-family="'Impact', sans-serif" font-weight="900" font-size="24" fill="#15803d" text-anchor="middle">VIM</text>
    <text x="50" y="102" font-family="Arial, sans-serif" font-weight="900" font-size="12" fill="#ca8a04" text-anchor="middle">DISHWASH GEL</text>

    <!-- Lemon Slice Graphic -->
    <circle cx="50" cy="130" r="14" fill="#facc15"/>
    <circle cx="50" cy="130" r="10" fill="#fef08a"/>

    <text x="50" y="160" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#15803d" text-anchor="middle">LEMON • 500ml</text>
  </g>
</svg>
