<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="dove-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </radialGradient>
    <linearGradient id="gold-dove" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#dove-bg)"/>
  <ellipse cx="200" cy="240" rx="90" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 65)">
    <!-- Soap Box -->
    <rect x="0" y="0" width="200" height="130" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Gold Dove Bird Icon -->
    <path d="M 100 30 C 85 25, 75 40, 85 50 C 95 60, 115 50, 120 40 C 125 35, 115 35, 100 30 Z" fill="url(#gold-dove)"/>

    <text x="100" y="75" font-family="'Georgia', serif" font-weight="700" font-size="26" fill="#0284c7" text-anchor="middle">Dove</text>
    <text x="100" y="96" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#64748b" text-anchor="middle">beauty bathing bar</text>
    <text x="100" y="114" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#0284c7" text-anchor="middle">1/4 MOISTURIZING CREAM • 100g</text>
  </g>
</svg>
