<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="lot-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </radialGradient>
    <linearGradient id="lot-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#lot-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(155, 30)">
    <!-- Pump Dispenser -->
    <rect x="35" y="10" width="30" height="14" fill="#db2777" rx="4"/>
    <rect x="45" y="24" width="10" height="16" fill="#cbd5e1"/>

    <!-- Bottle Body -->
    <rect x="15" y="40" width="70" height="165" rx="25" fill="url(#lot-bot)" stroke="#f472b6" stroke-width="2"/>

    <!-- Label -->
    <rect x="22" y="65" width="56" height="115" rx="10" fill="#fdf2f8"/>
    <circle cx="50" cy="95" r="12" fill="#f472b6"/>
    <circle cx="42" cy="85" r="5" fill="#f472b6"/>
    <circle cx="58" cy="85" r="5" fill="#f472b6"/>

    <text x="50" y="122" font-family="'Arial Black', sans-serif" font-weight="900" font-size="9" fill="#db2777" text-anchor="middle">HIMALAYA</text>
    <text x="50" y="136" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#ec4899" text-anchor="middle">BABY LOTION</text>
    <text x="50" y="160" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#9d174d" text-anchor="middle">200 ml</text>
  </g>
</svg>
