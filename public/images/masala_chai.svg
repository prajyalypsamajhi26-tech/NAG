<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="chai-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="kulhad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="chai-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#92400e" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#chai-bg)"/>

  <!-- Steaming Chai Waves -->
  <g opacity="0.6" stroke="#92400e" stroke-width="3" stroke-linecap="round" fill="none" transform="translate(180, 25)">
    <path d="M 0 40 Q -10 20 0 0 Q 10 -20 0 -40"/>
    <path d="M 20 45 Q 10 25 20 5 Q 30 -15 20 -35"/>
    <path d="M 40 40 Q 30 20 40 0 Q 50 -20 40 -40"/>
  </g>

  <!-- Kulhad (Clay Cup) -->
  <g filter="url(#chai-shadow)" transform="translate(130, 80)">
    <path d="M 20 20 L 120 20 L 105 150 C 105 165, 35 165, 35 150 Z" fill="url(#kulhad)"/>
    <!-- Rim detail -->
    <ellipse cx="70" cy="20" rx="50" ry="12" fill="#78350f"/>
    <!-- Liquid Surface -->
    <ellipse cx="70" cy="22" rx="46" ry="10" fill="#92400e"/>

    <!-- Cinnamon Stick & Cardamom garnish -->
    <rect x="85" y="0" width="10" height="70" rx="4" transform="rotate(25, 85, 0)" fill="#451a03"/>
    <circle cx="50" cy="22" r="3" fill="#fef08a"/>
    <circle cx="65" cy="24" r="2.5" fill="#fef08a"/>

    <!-- Clay textures / rings -->
    <path d="M 24 50 Q 70 60 116 50" fill="none" stroke="#78350f" stroke-width="2" opacity="0.4"/>
    <path d="M 28 90 Q 70 100 112 90" fill="none" stroke="#78350f" stroke-width="2" opacity="0.4"/>

    <text x="70" y="185" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#78350f" text-anchor="middle">MASALA CHAI</text>
  </g>
</svg>
