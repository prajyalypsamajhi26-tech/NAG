<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="mar-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </radialGradient>
    <linearGradient id="mar-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#mar-bg)"/>
  <ellipse cx="200" cy="240" rx="90" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 65)">
    <rect x="0" y="0" width="200" height="130" rx="16" fill="url(#mar-pack)"/>
    <path d="M 0 0 L 200 0 L 200 35 L 0 35 Z" fill="#ef4444"/>

    <text x="100" y="24" font-family="'Impact', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">BRITANNIA</text>
    <text x="100" y="70" font-family="'Georgia', serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle">Marie Gold</text>
    <text x="100" y="92" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#713f12" text-anchor="middle">TEA TIME BISCUITS</text>
    <text x="100" y="112" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#ffffff" text-anchor="middle">CRISPY &amp; LIGHT</text>
  </g>
</svg>
