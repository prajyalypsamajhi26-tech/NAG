<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="glu-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="meter-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glu-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#glu-bg)"/>

  <!-- Test Strip Vial Box (Left) -->
  <g filter="url(#glu-shadow)" transform="translate(70, 70)">
    <rect x="0" y="0" width="80" height="150" rx="8" fill="#2563eb"/>
    <rect x="10" y="15" width="60" height="120" rx="4" fill="#ffffff"/>
    <text x="40" y="40" font-family="Arial, sans-serif" font-weight="900" font-size="14" fill="#2563eb" text-anchor="middle">GLUCOSE</text>
    <text x="40" y="54" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#64748b" text-anchor="middle">TEST STRIPS</text>

    <!-- Droplet icon -->
    <path d="M 40 70 C 34 82 34 90 40 93 C 46 90 46 82 40 70 Z" fill="#ef4444"/>

    <text x="40" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e293b" text-anchor="middle">25 PCS</text>
  </g>

  <!-- Digital Glucometer Device (Right) -->
  <g filter="url(#glu-shadow)" transform="translate(190, 50)">
    <!-- Device Body -->
    <rect x="0" y="20" width="120" height="180" rx="28" fill="url(#meter-body)"/>

    <!-- Screen -->
    <rect x="18" y="45" width="84" height="65" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="80" font-family="'Courier New', monospace" font-weight="bold" font-size="26" fill="#047857" text-anchor="middle">105</text>
    <text x="60" y="98" font-family="Arial, sans-serif" font-weight="bold" font-size="9" fill="#059669" text-anchor="middle">mg / dL</text>

    <!-- Power button -->
    <circle cx="60" cy="145" r="16" fill="#475569" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="60" cy="145" r="6" fill="#ef4444"/>

    <!-- Test Strip inserted at bottom -->
    <rect x="52" y="195" width="16" height="40" fill="url(#strip)" rx="2"/>
    <rect x="54" y="225" width="12" height="6" fill="#991b1b"/>
  </g>
</svg>
