<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="ba-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ba-strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="ba-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#1d4ed8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#ba-bg)"/>

  <!-- Band-Aid Box (Left) -->
  <g filter="url(#ba-shadow)" transform="translate(60, 50)">
    <rect x="0" y="0" width="110" height="170" rx="8" fill="#2563eb"/>
    <rect x="10" y="15" width="90" height="140" rx="4" fill="#ffffff"/>

    <text x="55" y="42" font-family="'Arial Black', sans-serif" font-weight="900" font-size="14" fill="#1d4ed8" text-anchor="middle">BAND-AID</text>
    <text x="55" y="58" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#ea580c" text-anchor="middle">FLEXIBLE FABRIC</text>

    <!-- Cross logo -->
    <rect x="43" y="72" width="24" height="24" rx="4" fill="#ef4444"/>
    <path d="M 55 77 L 55 91 M 48 84 L 62 84" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

    <text x="55" y="125" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#1e293b" text-anchor="middle">100 PCS</text>
  </g>

  <!-- Individual Bandage Strips (Right) -->
  <g filter="url(#ba-shadow)" transform="translate(200, 80) rotate(25)">
    <!-- Bandage Body -->
    <rect x="0" y="0" width="130" height="42" rx="21" fill="url(#ba-strip)" stroke="#ca8a04" stroke-width="1.5"/>

    <!-- Pores / Perforations -->
    <circle cx="20" cy="14" r="1.5" fill="#ca8a04"/>
    <circle cx="20" cy="28" r="1.5" fill="#ca8a04"/>
    <circle cx="35" cy="14" r="1.5" fill="#ca8a04"/>
    <circle cx="35" cy="28" r="1.5" fill="#ca8a04"/>
    <circle cx="95" cy="14" r="1.5" fill="#ca8a04"/>
    <circle cx="95" cy="28" r="1.5" fill="#ca8a04"/>
    <circle cx="110" cy="14" r="1.5" fill="#ca8a04"/>
    <circle cx="110" cy="28" r="1.5" fill="#ca8a04"/>

    <!-- Non-stick Pad Center -->
    <rect x="45" y="4" width="40" height="34" rx="4" fill="#fef08a" stroke="#eab308" stroke-width="1"/>
  </g>
</svg>
