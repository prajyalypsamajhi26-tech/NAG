<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <filter id="bm-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#78716c" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#bm-bg)"/>

  <g filter="url(#bm-shadow)" transform="translate(130, 50)">
    <!-- Glass Body -->
    <path d="M 25 30 L 115 30 L 98 190 C 98 200, 42 200, 42 190 Z" fill="url(#glass)" stroke="#e7e5e4" stroke-width="3"/>

    <!-- Frothy Chaas Liquid -->
    <path d="M 27 34 L 113 34 L 97 186 C 97 194, 43 194, 43 186 Z" fill="#fafaf9"/>

    <!-- Froth bubbles top layer -->
    <ellipse cx="70" cy="34" rx="43" ry="10" fill="#f5f5f4"/>
    <circle cx="50" cy="32" r="5" fill="#ffffff"/>
    <circle cx="65" cy="35" r="4" fill="#ffffff"/>
    <circle cx="82" cy="33" r="6" fill="#ffffff"/>

    <!-- Coriander / Mint Leaves & Cumin Powder garnish -->
    <circle cx="60" cy="34" r="1.5" fill="#78350f"/>
    <circle cx="72" cy="36" r="2" fill="#78350f"/>
    <circle cx="80" cy="32" r="1.5" fill="#78350f"/>

    <path d="M 55 30 C 48 20, 65 15, 70 30 Z" fill="#16a34a"/>
    <path d="M 70 30 C 75 18, 90 22, 82 34 Z" fill="#15803d"/>

    <text x="70" y="222" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#44403c" text-anchor="middle">SPICED BUTTERMILK (CHAAS)</text>
  </g>
</svg>
