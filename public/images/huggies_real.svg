<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="hug-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </radialGradient>
    <linearGradient id="hug-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#hug-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="16" fill="url(#hug-pack)"/>

    <path d="M 0 0 L 140 0 L 140 50 Q 70 65 0 50 Z" fill="#ffffff"/>
    <text x="70" y="32" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#dc2626" text-anchor="middle" letter-spacing="0.5">HUGGIES</text>
    <text x="70" y="44" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#2563eb" text-anchor="middle">WONDER PANTS</text>

    <!-- Diaper Graphic -->
    <path d="M 32 75 C 32 135, 108 135, 108 75 L 96 75 C 96 115, 44 115, 44 75 Z" fill="#ffffff"/>
    <circle cx="70" cy="92" r="10" fill="#ef4444"/>

    <!-- Gold Size Badge -->
    <circle cx="110" cy="155" r="22" fill="#facc15" stroke="#ffffff" stroke-width="2"/>
    <text x="110" y="152" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#713f12" text-anchor="middle">SIZE</text>
    <text x="110" y="167" font-family="Arial, sans-serif" font-weight="900" font-size="17" fill="#713f12" text-anchor="middle">S</text>

    <text x="70" y="155" font-family="Arial, sans-serif" font-weight="900" font-size="15" fill="#ffffff" text-anchor="middle">WONDER PANTS</text>
    <text x="70" y="175" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#fecaca" text-anchor="middle">22 DIAPERS</text>
  </g>
</svg>
