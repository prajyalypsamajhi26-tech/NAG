<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="sp-bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="sp-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#047857" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#sp-bg)"/>

  <g filter="url(#sp-shadow)" transform="translate(145, 30)">
    <!-- Yellow Cap -->
    <rect x="38" y="15" width="24" height="15" rx="3" fill="#facc15"/>

    <!-- Bottle Neck -->
    <path d="M 42 30 L 58 30 L 62 70 L 38 70 Z" fill="url(#sp-bottle)"/>

    <!-- Bottle Body -->
    <path d="M 20 70 L 80 70 C 90 90, 90 200, 80 220 L 20 220 C 10 200, 10 90, 20 70 Z" fill="url(#sp-bottle)"/>

    <!-- Sprite Yellow/Green Splash Label -->
    <polygon points="15,110 85,95 85,160 15,175" fill="#10b981"/>
    <circle cx="50" cy="135" r="22" fill="#facc15"/>
    <text x="50" y="142" font-family="'Arial Black', sans-serif" font-weight="900" font-style="italic" font-size="16" fill="#047857" text-anchor="middle">Sprite</text>

    <!-- Lemon / Lime Slice Graphic -->
    <circle cx="25" cy="180" r="10" fill="#facc15"/>
    <circle cx="25" cy="180" r="7" fill="#84cc16"/>

    <text x="50" y="245" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#047857" text-anchor="middle">SPRITE 300ml</text>
  </g>
</svg>
