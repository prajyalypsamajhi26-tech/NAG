<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="cer-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </radialGradient>
    <linearGradient id="cer-box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#cer-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="12" fill="url(#cer-box)"/>

    <path d="M 0 45 Q 70 65 140 45 L 140 0 L 0 0 Z" fill="#fbbf24"/>
    <text x="70" y="30" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#1e3a8a" text-anchor="middle">NESTLÉ</text>

    <text x="70" y="85" font-family="'Arial Black', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">CERELAC</text>
    <text x="70" y="104" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#fef08a" text-anchor="middle">WHEAT APPLE</text>

    <!-- Cereal Bowl & Spoon -->
    <ellipse cx="70" cy="148" rx="42" ry="18" fill="#fef08a"/>
    <path d="M 28 148 C 28 178, 112 178, 112 148 Z" fill="#facc15"/>
    <path d="M 85 130 Q 110 118 122 98" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>

    <text x="70" y="180" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#ffffff" text-anchor="middle">STAGE 1 • 300g</text>
  </g>
</svg>
