<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="ore-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <linearGradient id="ore-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#ore-bg)"/>
  <ellipse cx="200" cy="240" rx="90" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 65)">
    <rect x="0" y="0" width="200" height="130" rx="16" fill="url(#ore-pack)"/>

    <!-- Oreo Biscuit Circles -->
    <circle cx="50" cy="65" r="28" fill="#1e293b" stroke="#ffffff" stroke-width="3"/>
    <circle cx="50" cy="65" r="22" fill="#0f172a"/>

    <text x="125" y="60" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle">OREO</text>
    <text x="125" y="82" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#7dd3fc" text-anchor="middle">SANDWICH COOKIES</text>
    <text x="125" y="102" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#ffffff" text-anchor="middle">MILK'S FAVORITE COOKIE</text>
  </g>
</svg>
