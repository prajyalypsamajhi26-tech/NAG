    <!-- Clear Tub Body -->
    <rect x="0" y="45" width="150" height="110" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

    <text x="75" y="48" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">Vaseline</text>
    <text x="75" y="95" font-family="Arial, sans-serif" font-weight="900" font-size="13" fill="#0369a1" text-anchor="middle">PETROLEUM JELLY</text>
    <text x="75" y="118" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#0284c7" text-anchor="middle">PURE SKIN JELLY • 50g</text>
  </g>
