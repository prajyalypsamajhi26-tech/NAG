    <text x="70" y="80" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#ef4444" text-anchor="middle">Lay's</text>

    <text x="70" y="132" font-family="'Arial Black', sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle">SPANISH</text>
    <text x="70" y="148" font-family="'Arial Black', sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle">TOMATO TANGO</text>
    <text x="70" y="175" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#fed7aa" text-anchor="middle">POTATO CHIPS</text>
