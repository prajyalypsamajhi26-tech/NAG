<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="wip-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <linearGradient id="wip-pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#wip-bg)"/>
  <ellipse cx="200" cy="230" rx="110" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(90, 75)">
    <!-- Wipes Soft Bag -->
    <rect x="0" y="0" width="220" height="130" rx="24" fill="url(#wip-pack)"/>

    <!-- Plastic Flip Top Lid -->
    <rect x="70" y="25" width="80" height="48" rx="12" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
    <ellipse cx="110" cy="49" rx="24" ry="9" fill="#bfdbfe"/>
    <rect x="95" y="58" width="30" height="5" rx="3" fill="#2563eb"/>

    <!-- Wet Wipe Cloth pulling out -->
    <path d="M 90 25 Q 110 -5 130 25 Z" fill="#ffffff" opacity="0.95"/>

    <text x="110" y="98" font-family="'Arial Black', sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">JOHNSON'S</text>
    <text x="110" y="115" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#93c5fd" text-anchor="middle">BABY WIPES • 72 WIPES</text>
  </g>
</svg>
