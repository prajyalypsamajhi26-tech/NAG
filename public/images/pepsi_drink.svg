<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="pep-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="pep-can" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="pep-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#1e40af" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#pep-bg)"/>

  <g filter="url(#pep-shadow)" transform="translate(145, 30)">
    <!-- Can Rim -->
    <ellipse cx="50" cy="25" rx="30" ry="8" fill="#e2e8f0"/>

    <!-- Can Body -->
    <rect x="20" y="25" width="60" height="185" fill="url(#pep-can)" rx="6"/>

    <!-- Globe Logo Circle -->
    <circle cx="50" cy="115" r="24" fill="#ffffff"/>
    <path d="M 26 115 C 35 95, 65 95, 74 115 Z" fill="#ef4444"/>
    <path d="M 26 115 C 35 135, 65 135, 74 115 Z" fill="#2563eb"/>

    <text x="50" y="70" font-family="'Arial Black', sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">pepsi</text>

    <text x="50" y="235" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#1d4ed8" text-anchor="middle">PEPSI 300ml</text>
  </g>
</svg>
