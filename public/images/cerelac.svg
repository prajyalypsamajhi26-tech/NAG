<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cer-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="cer-box" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="cer-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#1d4ed8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#cer-bg)"/>

  <g filter="url(#cer-shadow)" transform="translate(130, 40)">
    <!-- Box Body -->
    <rect x="0" y="0" width="140" height="190" rx="10" fill="url(#cer-box)"/>

    <!-- Yellow Curved Banner -->
    <path d="M 0 40 Q 70 60 140 40 L 140 0 L 0 0 Z" fill="#fbbf24"/>
    <text x="70" y="28" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="#1e3a8a" text-anchor="middle">NESTLÉ</text>

    <!-- Product Title -->
    <text x="70" y="85" font-family="'Arial Black', sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">CERELAC</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#fef08a" text-anchor="middle">WHEAT APPLE</text>

    <!-- Bowl of Cereal with Spoon -->
    <ellipse cx="70" cy="150" rx="40" ry="18" fill="#fef08a"/>
    <path d="M 30 150 C 30 180, 110 180, 110 150 Z" fill="#facc15"/>
    <!-- Spoon -->
    <path d="M 85 130 Q 110 120 120 100" stroke="#cbd5e1" stroke-width="4" fill="none" stroke-linecap="round"/>

    <text x="70" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">STAGE 1 • 300g</text>
  </g>
</svg>
