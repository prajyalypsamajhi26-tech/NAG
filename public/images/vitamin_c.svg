<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="vitc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="vitc-bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="vitc-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#ea580c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#vitc-bg)"/>

  <!-- Orange Slices behind -->
  <g opacity="0.3" transform="translate(60, 50)">
    <circle cx="50" cy="50" r="45" fill="#f97316"/>
    <circle cx="50" cy="50" r="35" fill="#ffedd5"/>
  </g>

  <g filter="url(#vitc-shadow)" transform="translate(140, 45)">
    <!-- White Cap -->
    <rect x="25" y="15" width="70" height="25" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="20" y="40" width="80" height="10" fill="#e2e8f0"/>

    <!-- Bottle Body -->
    <rect x="15" y="50" width="90" height="140" rx="18" fill="url(#vitc-bottle)"/>

    <!-- White Label -->
    <rect x="20" y="70" width="80" height="95" rx="6" fill="#ffffff"/>

    <text x="60" y="94" font-family="Arial, sans-serif" font-weight="900" font-size="13" fill="#ea580c" text-anchor="middle">VITAMIN C</text>
    <text x="60" y="110" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#f97316" text-anchor="middle">500 mg</text>

    <!-- Orange slice icon on label -->
    <circle cx="60" cy="132" r="12" fill="#f97316"/>
    <circle cx="60" cy="132" r="8" fill="#ffedd5"/>

    <text x="60" y="154" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">CHEWABLE TABS</text>

    <!-- Spilled Orange Pills -->
    <ellipse cx="130" cy="170" rx="12" ry="8" fill="#fb923c" transform="rotate(20, 130, 170)"/>
    <ellipse cx="145" cy="185" rx="12" ry="8" fill="#fb923c" transform="rotate(-15, 145, 185)"/>
  </g>
</svg>
