<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="sd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="sd-bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="sd-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#16a34a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#sd-bg)"/>

  <g filter="url(#sd-shadow)" transform="translate(145, 25)">
    <!-- Red Crown Cap -->
    <rect x="38" y="15" width="24" height="14" rx="2" fill="#ef4444"/>

    <!-- Neck -->
    <path d="M 40 29 L 60 29 L 64 65 L 36 65 Z" fill="url(#sd-bottle)"/>

    <!-- Bottle Body -->
    <path d="M 18 65 L 82 65 C 90 85, 90 205, 82 225 L 18 225 C 10 205, 10 85, 18 65 Z" fill="url(#sd-bottle)" opacity="0.85"/>

    <!-- White Soda Label -->
    <rect x="14" y="105" width="72" height="60" rx="4" fill="#ffffff"/>
    <text x="50" y="130" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="14" fill="#16a34a" text-anchor="middle">FAURITO</text>
    <text x="50" y="146" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#ef4444" text-anchor="middle">CLUB SODA</text>

    <!-- Carbonated Fizz Bubbles -->
    <circle cx="35" cy="80" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="55" cy="90" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="65" cy="75" r="2.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="45" cy="180" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="60" cy="195" r="4" fill="#ffffff" opacity="0.8"/>

    <text x="50" y="245" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#15803d" text-anchor="middle">CLUB SODA 500ml</text>
  </g>
</svg>
