<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="hit-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </radialGradient>
    <linearGradient id="hit-can" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#hit-bg)"/>
  <ellipse cx="200" cy="245" rx="45" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(160, 25)">
    <!-- Aerosol Spray Button Cap -->
    <rect x="30" y="10" width="20" height="15" fill="#ffffff" rx="3"/>
    <rect x="25" y="25" width="30" height="10" fill="#1e293b"/>

    <!-- Red Aerosol Can Body -->
    <rect x="15" y="35" width="50" height="175" rx="12" fill="url(#hit-can)"/>

    <rect x="20" y="65" width="40" height="110" rx="6" fill="#ffffff"/>
    <text x="40" y="94" font-family="'Impact', sans-serif" font-weight="900" font-size="24" fill="#b91c1c" text-anchor="middle">HIT</text>
    <text x="40" y="112" font-family="Arial, sans-serif" font-weight="900" font-size="8" fill="#1e293b" text-anchor="middle">FLYING INSECT</text>
    <text x="40" y="124" font-family="Arial, sans-serif" font-weight="900" font-size="8" fill="#ef4444" text-anchor="middle">KILLER</text>

    <!-- Mosquito Target Graphic -->
    <circle cx="40" cy="145" r="10" fill="none" stroke="#b91c1c" stroke-width="2"/>
    <line x1="25" y1="145" x2="55" y2="145" stroke="#b91c1c" stroke-width="2"/>

    <text x="40" y="168" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#b91c1c" text-anchor="middle">400 ml</text>
  </g>
</svg>
