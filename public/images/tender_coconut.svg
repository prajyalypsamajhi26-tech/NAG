<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="tc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="coconut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="tc-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#15803d" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#tc-bg)"/>

  <g filter="url(#tc-shadow)" transform="translate(110, 50)">
    <!-- Red Straw -->
    <path d="M 120 10 L 100 40 L 70 70" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 10 L 100 40 L 70 70" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Green Coconut Shell Body -->
    <ellipse cx="90" cy="120" rx="75" ry="70" fill="url(#coconut)"/>

    <!-- Cut Open Top Crown -->
    <polygon points="45,60 90,40 135,60 115,75 65,75" fill="#166534"/>
    <ellipse cx="90" cy="65" rx="35" ry="12" fill="#fef08a"/>
    <ellipse cx="90" cy="65" rx="28" ry="8" fill="#38bdf8" opacity="0.8"/>

    <!-- Hibiscus Flower Accent -->
    <circle cx="45" cy="85" r="14" fill="#f43f5e"/>
    <circle cx="45" cy="85" r="4" fill="#facc15"/>

    <text x="90" y="212" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#0369a1" text-anchor="middle">TENDER COCONUT WATER</text>
  </g>
</svg>
