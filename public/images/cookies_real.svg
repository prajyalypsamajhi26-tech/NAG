<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="ck-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#ck-bg)"/>
  <ellipse cx="200" cy="240" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 45)">
    <!-- Chocolate Chip Cookie Graphic -->
    <circle cx="100" cy="80" r="55" fill="#d97706" stroke="#b45309" stroke-width="3"/>
    
    <!-- Choc Chips -->
    <circle cx="75" cy="60" r="7" fill="#451a03"/>
    <circle cx="120" cy="65" r="8" fill="#451a03"/>
    <circle cx="95" cy="95" r="9" fill="#451a03"/>
    <circle cx="125" cy="100" r="6" fill="#451a03"/>
    <circle cx="65" cy="95" r="6" fill="#451a03"/>

    <text x="100" y="165" font-family="'Impact', sans-serif" font-weight="900" font-size="18" fill="#78350f" text-anchor="middle">CHOC CHUNK COOKIES</text>
  </g>
</svg>
