<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="ors-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="sachet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="ors-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#c2410c" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="url(#ors-bg)"/>

  <!-- Glass of Water -->
  <g opacity="0.9" transform="translate(70, 70)">
    <path d="M 20 20 L 30 150 C 30 160 80 160 80 150 L 90 20 Z" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
    <path d="M 24 50 L 32 145 C 32 153 78 153 78 145 L 86 50 Z" fill="#7dd3fc" opacity="0.6"/>
    <!-- Lemon Slice -->
    <circle cx="20" cy="30" r="18" fill="#facc15" stroke="#eab308" stroke-width="2"/>
    <circle cx="20" cy="30" r="13" fill="#fef08a"/>
  </g>

  <!-- ORS Sachet Box/Packet -->
  <g filter="url(#ors-shadow)" transform="translate(180, 50)">
    <rect x="0" y="0" width="140" height="190" rx="12" fill="url(#sachet)"/>
    <!-- Top & Bottom serrated edges effect -->
    <rect x="0" y="0" width="140" height="12" rx="2" fill="#9a3412"/>
    <rect x="0" y="178" width="140" height="12" rx="2" fill="#9a3412"/>

    <!-- White Center Card -->
    <rect x="12" y="24" width="116" height="142" rx="8" fill="#ffffff"/>

    <text x="70" y="52" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="#ea580c" text-anchor="middle">ORS</text>
    <rect x="30" y="60" width="80" height="4" rx="2" fill="#f97316"/>

    <text x="70" y="80" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e293b" text-anchor="middle">REHYDRATION</text>
    <text x="70" y="94" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#64748b" text-anchor="middle">FORMULA</text>

    <!-- Plus badge -->
    <circle cx="70" cy="122" r="16" fill="#ea580c"/>
    <path d="M 70 112 L 70 132 M 60 122 L 80 122" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

    <text x="70" y="156" font-family="Arial, sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">5 SACHETS</text>
  </g>
</svg>
