<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="orb-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#orb-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(150, 25)">
    <!-- Toothbrush Bristle Head -->
    <rect x="35" y="10" width="30" height="40" rx="6" fill="#0284c7"/>
    <rect x="40" y="15" width="20" height="30" rx="4" fill="#ffffff"/>

    <!-- Toothbrush Handle -->
    <rect x="42" y="50" width="16" height="155" rx="8" fill="#38bdf8"/>
    <rect x="45" y="80" width="10" height="90" rx="5" fill="#0284c7"/>

    <text x="50" y="222" font-family="'Impact', sans-serif" font-weight="900" font-size="14" fill="#0369a1" text-anchor="middle">ORAL-B 3-PACK</text>
  </g>
</svg>
