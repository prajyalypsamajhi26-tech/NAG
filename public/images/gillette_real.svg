<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="gil-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#gil-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(150, 30)">
    <!-- Razor Cartridge Head -->
    <rect x="15" y="10" width="70" height="25" rx="4" fill="#0284c7"/>
    <line x1="25" y1="17" x2="75" y2="17" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="25" y1="22" x2="75" y2="22" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="25" y1="27" x2="75" y2="27" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Handle -->
    <rect x="42" y="35" width="16" height="170" rx="8" fill="#1e293b"/>
    <rect x="44" y="55" width="12" height="110" rx="6" fill="#0284c7"/>

    <text x="50" y="222" font-family="'Impact', sans-serif" font-weight="900" font-size="14" fill="#0369a1" text-anchor="middle">GILLETTE MACH3</text>
  </g>
</svg>
