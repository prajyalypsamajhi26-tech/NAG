<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="mop-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#mop-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(110, 50)">
    <!-- Spin Bucket Container -->
    <rect x="0" y="50" width="180" height="110" rx="20" fill="#0284c7"/>
    <ellipse cx="130" cy="70" rx="35" ry="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>

    <!-- Mop Handle & Head -->
    <rect x="55" y="0" width="10" height="130" fill="#e2e8f0" rx="4"/>
    <circle cx="60" cy="130" r="25" fill="#ffffff" stroke="#38bdf8" stroke-width="3"/>

    <text x="75" y="180" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#0369a1" text-anchor="middle">GALA SPIN MOP</text>
  </g>
</svg>
