<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="hs-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <linearGradient id="hs-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#hs-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(150, 25)">
    <!-- Blue Curved Cap -->
    <path d="M 15 15 Q 50 -5 85 15 L 85 40 L 15 40 Z" fill="#0284c7"/>

    <!-- Bottle Body -->
    <rect x="15" y="40" width="70" height="165" rx="20" fill="url(#hs-bot)" stroke="#38bdf8" stroke-width="2"/>

    <path d="M 15 40 Q 50 65 85 40 L 85 95 Q 50 115 15 95 Z" fill="#0284c7"/>
    <text x="50" y="68" font-family="'Arial Black', sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle">head &amp;</text>
    <text x="50" y="82" font-family="'Arial Black', sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle">shoulders</text>

    <text x="50" y="135" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#0369a1" text-anchor="middle">SMOOTH &amp; SILKY</text>
    <text x="50" y="150" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1e293b" text-anchor="middle">ANTI-DANDRUFF</text>
    <text x="50" y="178" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#0284c7" text-anchor="middle">180 ml</text>
  </g>
</svg>
