<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="niv-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <linearGradient id="niv-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#niv-bg)"/>
  <ellipse cx="200" cy="245" rx="75" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(125, 45)">
    <!-- Round Tub Cap -->
    <ellipse cx="75" cy="50" rx="75" ry="35" fill="url(#niv-blue)"/>
    <!-- Tub Base -->
    <rect x="0" y="50" width="150" height="110" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

    <text x="75" y="56" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">NIVEA</text>
    <text x="75" y="105" font-family="Arial, sans-serif" font-weight="900" font-size="14" fill="#1e3a8a" text-anchor="middle">SOFT CREAM</text>
    <text x="75" y="125" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#3b82f6" text-anchor="middle">LIGHT MOISTURISER • 100ml</text>
  </g>
</svg>
