<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="him-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#him-bg)"/>
  <ellipse cx="200" cy="245" rx="55" ry="12" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(150, 25)">
    <!-- Tube Cap -->
    <rect x="25" y="180" width="50" height="25" rx="6" fill="#065f46"/>

    <!-- Tube Body -->
    <path d="M 15 10 L 85 10 L 75 180 L 25 180 Z" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <path d="M 20 60 L 80 60 L 75 180 L 25 180 Z" fill="#6ee7b7" opacity="0.4"/>

    <text x="50" y="38" font-family="'Arial Black', sans-serif" font-weight="900" font-size="9" fill="#047857" text-anchor="middle">HIMALAYA</text>
    <text x="50" y="52" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#065f46" text-anchor="middle">HERBALS</text>
    <text x="50" y="90" font-family="'Arial Black', sans-serif" font-weight="900" font-size="10" fill="#065f46" text-anchor="middle">PURIFYING</text>
    <text x="50" y="104" font-family="'Arial Black', sans-serif" font-weight="900" font-size="10" fill="#047857" text-anchor="middle">NEEM FACE WASH</text>

    <!-- Neem Leaf Icon -->
    <path d="M 50 120 C 35 125, 40 145, 50 150 C 60 145, 65 125, 50 120 Z" fill="#059669"/>

    <text x="50" y="170" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#047857" text-anchor="middle">100 ml</text>
  </g>
</svg>
