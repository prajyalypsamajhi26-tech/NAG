<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="bro-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#bro-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 30)">
    <!-- Broom Handle -->
    <rect x="90" y="0" width="20" height="120" rx="6" fill="#2563eb"/>
    <!-- Broom Grass Bristles Fan -->
    <path d="M 100 110 L 20 200 L 180 200 Z" fill="#d97706"/>

    <text x="100" y="218" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#1e3a8a" text-anchor="middle">GALA NO-DUST BROOM</text>
  </g>
</svg>
