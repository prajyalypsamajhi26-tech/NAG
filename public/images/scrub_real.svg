<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="scr-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </radialGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#scr-bg)"/>
  <ellipse cx="200" cy="240" rx="90" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 70)">
    <!-- Yellow Sponge Layer -->
    <rect x="0" y="35" width="200" height="75" rx="12" fill="#facc15"/>
    <!-- Green Scrubber Layer -->
    <rect x="0" y="0" width="200" height="40" rx="12" fill="#15803d"/>

    <text x="100" y="26" font-family="'Impact', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">SCOTCH-BRITE</text>
    <text x="100" y="65" font-family="'Arial Black', sans-serif" font-weight="900" font-size="16" fill="#1e293b" text-anchor="middle">SCRUB PAD</text>
    <text x="100" y="90" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#854d0e" text-anchor="middle">3 PCS PACK</text>
  </g>
</svg>
