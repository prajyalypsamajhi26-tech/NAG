<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bag-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="bag-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#334155" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#bag-bg)"/>

  <g filter="url(#bag-shadow)" transform="translate(130, 40)">
    <!-- Top Handle -->
    <path d="M 50 20 Q 70 0 90 20" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Backpack Body -->
    <rect x="20" y="20" width="100" height="160" rx="18" fill="#334155"/>
    <rect x="20" y="20" width="100" height="50" rx="18" fill="#475569"/>

    <!-- Front Zipper Pocket -->
    <rect x="30" y="90" width="80" height="75" rx="10" fill="#1e293b"/>
    <line x1="30" y1="95" x2="110" y2="95" stroke="#f59e0b" stroke-width="3"/>

    <!-- Bottle side pockets -->
    <rect x="10" y="80" width="15" height="60" rx="4" fill="#0f172a"/>
    <rect x="115" y="80" width="15" height="60" rx="4" fill="#0f172a"/>

    <text x="70" y="140" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">DIAPER BAG</text>
  </g>
</svg>
