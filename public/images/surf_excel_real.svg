<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="surf-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </radialGradient>
    <linearGradient id="surf-bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#surf-bg)"/>
  <ellipse cx="200" cy="245" rx="85" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="195" rx="14" fill="url(#surf-bag)"/>
    <path d="M 0 0 L 140 0 L 140 40 Q 70 55 0 40 Z" fill="#ef4444"/>

    <text x="70" y="26" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">SURF EXCEL</text>
    <text x="70" y="70" font-family="'Arial Black', sans-serif" font-weight="900" font-size="16" fill="#fde047" text-anchor="middle">EASY WASH</text>

    <!-- Detergent Stain Blast Star -->
    <path d="M 70 95 L 76 110 L 92 110 L 79 120 L 84 135 L 70 125 L 56 135 L 61 120 L 48 110 L 64 110 Z" fill="#facc15"/>
    <circle cx="70" cy="115" r="10" fill="#dc2626"/>

    <text x="70" y="160" font-family="Arial, sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">DETERGENT POWDER</text>
    <text x="70" y="180" font-family="Arial, sans-serif" font-weight="800" font-size="13" fill="#93c5fd" text-anchor="middle">1 kg PACK</text>
  </g>
</svg>
