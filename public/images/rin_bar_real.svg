<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="rin-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <linearGradient id="rin-bar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="400" height="300" rx="16" fill="url(#rin-bg)"/>
  <ellipse cx="200" cy="240" rx="95" ry="14" fill="#0f172a" opacity="0.15"/>

  <g filter="url(#shadow-3d)" transform="translate(100, 65)">
    <!-- 4-Pack Detergent Bars -->
    <rect x="0" y="0" width="200" height="130" rx="16" fill="url(#rin-bar)"/>
    <path d="M 0 0 L 200 0 L 200 35 L 0 35 Z" fill="#eab308"/>

    <text x="100" y="24" font-family="'Impact', sans-serif" font-weight="900" font-size="20" fill="#1e3a8a" text-anchor="middle">RIN ADVANCED</text>
    <text x="100" y="75" font-family="'Impact', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle">RIN BAR</text>
    <text x="100" y="98" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#fde047" text-anchor="middle">SUPER SHINE • 4 BARS</text>
    <text x="100" y="118" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#93c5fd" text-anchor="middle">250g x 4 PACK</text>
  </g>
</svg>
